name: macOS Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-check.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/macos-check.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"

jobs:
  macos-build:
    name: macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            macosx_deployment_target: "11.0"
            ggml_cpu_arm_arch: "armv8.2-a+dotprod"
            cflags: "-march=armv8.2-a+dotprod -U__ARM_FEATURE_MATMUL_INT8"
            cxxflags: "-march=armv8.2-a+dotprod -U__ARM_FEATURE_MATMUL_INT8"
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            macosx_deployment_target: "10.15"
            ggml_cpu_arm_arch: ""
            cflags: ""
            cxxflags: ""

    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
      CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
      CMAKE_GGML_CPU_ARM_ARCH: ${{ matrix.ggml_cpu_arm_arch }}
      CMAKE_GGML_NATIVE: "OFF"
      CMAKE_GGML_CPU_ALL_VARIANTS: "OFF"
      CFLAGS: ${{ matrix.cflags }}
      CFLAGS_aarch64_apple_darwin: ${{ matrix.cflags }}
      CMAKE_C_FLAGS: ${{ matrix.cflags }}
      CXXFLAGS: ${{ matrix.cxxflags }}
      CXXFLAGS_aarch64_apple_darwin: ${{ matrix.cxxflags }}
      CMAKE_CXX_FLAGS: ${{ matrix.cxxflags }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build Rust app (no release upload)
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --target ${{ matrix.target }}
